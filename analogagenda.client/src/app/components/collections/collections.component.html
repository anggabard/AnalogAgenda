<div class="container">
  <div class="header">
    <button type="button" class="add-collection" (click)="onNewClick()">+ New Collection +</button>
  </div>

  <app-error-message [message]="errorMessage"></app-error-message>

  <div class="collections-section" *ngIf="!errorMessage && settingsLoaded">
    <app-table-list
      *ngIf="tableView && collectionRowTemplate"
      [items]="collections"
      [rowTemplate]="collectionRowTemplate"
      [columnHeaders]="collectionTableHeaders"
      [hasMore]="false"
      [loading]="loading"
      (itemClick)="onCollectionClick($event)"
      (itemAuxClick)="onCollectionOpenInNewTab($event)">
    </app-table-list>

    <ng-container *ngIf="!tableView">
      <div *ngIf="loading" class="loading-row">Loading collections…</div>
      <div
        *ngIf="!loading && collections.length > 0 && collectionCardTemplate"
        class="collections-grid">
        <div
          *ngFor="let c of collections"
          class="collection-grid-cell"
          (click)="onCollectionClick(c)"
          (mousedown)="onCollectionGridMiddleMouseDown($event)"
          (auxclick)="onCollectionGridAuxClick($event, c)">
          <ng-container *ngTemplateOutlet="collectionCardTemplate; context: { $implicit: c }"></ng-container>
        </div>
      </div>
    </ng-container>
  </div>

  <div *ngIf="!loading && collections.length === 0 && !errorMessage && settingsLoaded" class="empty-state">
    <p>No collections yet. Create one with the button above.</p>
  </div>
</div>

<ng-template #collectionCardTemplate let-c>
  <div class="card collection-card-inner">
    <div class="collection-card-badges" *ngIf="c.isOpen || c.isPublic">
      <span *ngIf="c.isOpen" class="status-badge status-open">Open</span>
      <span *ngIf="c.isPublic" class="status-badge status-public">Public</span>
    </div>
    <div class="image collection-thumb">
      <img *ngIf="hasCardImage(c)" [src]="cardImageUrl(c)" alt="" />
    </div>
    <div class="collection-card-text">
      <span class="title">{{ c.name }}</span>
      <span class="info range" *ngIf="formatRange(c)">{{ formatRange(c) }}</span>
      <span class="info location" *ngIf="c.location?.trim()">{{ c.location }}</span>
    </div>
  </div>
</ng-template>

<ng-template #collectionRowTemplate let-c>
  <td>{{ c.name }}</td>
  <td>{{ formatDateColumn(c.fromDate) }}</td>
  <td>{{ formatDateColumn(c.toDate) }}</td>
  <td>{{ c.location?.trim() || '' }}</td>
  <td>{{ !c.isOpen }}</td>
  <td class="collection-cell-image">
    <app-image-preview [imageUrl]="cardImageUrl(c)" [alt]="c.name" popoverPosition="left"></app-image-preview>
  </td>
</ng-template>
