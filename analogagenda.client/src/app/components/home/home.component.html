<div class="home-container">
    <div class="home-edit-toolbar">
        <button type="button" class="edit-home-btn" (click)="toggleEditHomeLayout()">
            {{ isEditingHomeLayout ? 'Done' : 'Edit Home' }}
        </button>
    </div>

    <ng-template #homeSectionContent let-sectionId="sectionId">
        <ng-container [ngSwitch]="sectionId">
            <app-film-check-section *ngSwitchCase="'filmCheck'"></app-film-check-section>
            <app-current-film-section
                *ngSwitchCase="'currentFilm'"
                [userSettings]="userSettings"
                [currentFilm]="currentFilm"
                (changeCurrentFilmRequested)="openChangeCurrentFilmModal()">
            </app-current-film-section>
            <app-settings-section
                *ngSwitchCase="'settings'"
                [userSettings]="userSettings"
                (settingsUpdated)="loadUserSettings()">
            </app-settings-section>
            <app-wacky-ideas-section
                *ngSwitchCase="'wackyIdeas'"
                (addIdea)="openAddIdeaModal()"
                (editIdea)="openEditIdeaModal($event)">
            </app-wacky-ideas-section>
            <app-photo-of-the-day-section *ngSwitchCase="'photoOfTheDay'"></app-photo-of-the-day-section>
        </ng-container>
    </ng-template>

    <!-- Browse: responsive grid, no drag -->
    <div *ngIf="!isEditingHomeLayout" class="sections-row">
        <div *ngFor="let sectionId of homeSectionOrder; trackBy: trackBySectionId" class="home-section-tile">
            <div class="home-section-tile-inner">
                <ng-container *ngTemplateOutlet="homeSectionContent; context: { sectionId: sectionId }"></ng-container>
            </div>
        </div>
    </div>

    <!-- Edit: numbered zones; page scrolls with the window (no nested scroll box). -->
    <div
        *ngIf="isEditingHomeLayout"
        class="sections-row sections-row--reorder"
        cdkDropList
        [cdkDropListData]="homeSectionOrder"
        [cdkDropListAutoScrollStep]="32"
        (cdkDropListDropped)="onHomeSectionDrop($event)">
        <div
            *ngFor="let sectionId of homeSectionOrder; let zoneIndex = index; trackBy: trackBySectionId"
            class="home-zone-row"
            cdkDrag
            [cdkDragData]="sectionId"
            cdkDragPreviewClass="home-section-drag-float"
            cdkDragPlaceholderClass="home-section-drag-slot"
            (cdkDragMoved)="onHomeDragMoved($event)">
            <div class="home-zone-label" aria-hidden="true">{{ zoneIndex + 1 }}</div>
            <div class="home-zone-body">
                <div class="home-section-tile-inner home-section-tile-inner--muted">
                    <ng-container *ngTemplateOutlet="homeSectionContent; context: { sectionId: sectionId }"></ng-container>
                </div>
            </div>
        </div>
    </div>

    <!-- Change Current Film Modal -->
    <div class="modal-overlay" *ngIf="isChangeCurrentFilmModalOpen" (click)="closeChangeCurrentFilmModal()">
        <div class="modal-content" (click)="$event.stopPropagation()">
            <div class="modal-header">
                <div></div>
                <h3>Change Current Film</h3>
                <button class="modal-close" (click)="closeChangeCurrentFilmModal()">✕</button>
            </div>
            <div class="modal-body">
                <input
                    type="search"
                    class="modal-list-search"
                    [(ngModel)]="changeCurrentFilmModalSearch"
                    placeholder="Search films..."
                    aria-label="Search films" />
                <div class="film-list">
                    <div 
                        *ngFor="let film of filmsForChangeModal" 
                        class="film-item"
                        [class.selected]="selectedFilmId === film.id"
                        (click)="selectedFilmId = film.id">
                        <div class="film-item-info">
                            <div class="film-name">{{ film.name || film.brand }}</div>
                            <div class="film-details">
                                <span>ISO: {{ film.iso }}</span>
                                <span>Type: {{ film.type }}</span>
                            </div>
                        </div>
                        <img class="film-item-image" [src]="film.imageUrl" [alt]="film.name || film.brand" />
                    </div>
                    <div *ngIf="availableFilms.length === 0" class="no-films">
                        No not-developed films available
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button 
                    class="btn btn-primary" 
                    (click)="changeCurrentFilm()"
                    [disabled]="!selectedFilmId">
                    Save
                </button>
                <button class="btn btn-secondary" (click)="closeChangeCurrentFilmModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Upsert Idea Modal -->
    <div class="modal-overlay" *ngIf="isUpsertIdeaModalOpen"
        (mousedown)="onUpsertIdeaOverlayMouseDown($event)"
        (mouseup)="onUpsertIdeaOverlayMouseUp($event)">
        <div class="modal-content" (mousedown)="onUpsertIdeaModalContentMouseDown()">
            <div class="modal-header">
                <div></div>
                <h3>{{ selectedIdea ? 'Edit Idea' : 'Add Idea' }}</h3>
                <button class="modal-close" (click)="closeUpsertIdeaModal()">✕</button>
            </div>
            <div class="modal-body">
                <app-upsert-idea
                    [idea]="selectedIdea"
                    (saved)="onIdeaSaved()"
                    (deleted)="onIdeaDeleted()">
                </app-upsert-idea>
            </div>
        </div>
    </div>
</div>
