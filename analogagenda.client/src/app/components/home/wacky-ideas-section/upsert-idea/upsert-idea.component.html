<form [formGroup]="form" (ngSubmit)="submit()" class="form">
    <app-error-message [message]="errorMessage"></app-error-message>

    <div>
        <label for="ideaTitle">Title</label>
        <input type="text" id="ideaTitle" formControlName="title" placeholder="Title" class="input" />
    </div>

    <div>
        <label for="ideaDescription">Description</label>
        <textarea id="ideaDescription" formControlName="description" placeholder="Description" class="input textarea" rows="4"></textarea>
    </div>

    <div>
        <label for="ideaOutcome">Outcome</label>
        <textarea id="ideaOutcome" formControlName="outcome" placeholder="Outcome" class="input textarea" rows="4"></textarea>
    </div>

    <div class="form-actions" [class.form-actions-three]="isEditMode">
        <div class="form-actions-slot form-actions-start">
            <button type="submit" class="btn btn-primary" [disabled]="!form.valid || isSubmitting">
                {{ isEditMode ? 'Save' : 'Add' }}
            </button>
        </div>
        <div class="form-actions-slot form-actions-middle" *ngIf="isEditMode">
            <button type="button" class="btn btn-secondary" (click)="onViewResults()" [disabled]="isSubmitting">
                View Results
            </button>
        </div>
        <div class="form-actions-slot form-actions-end" *ngIf="isEditMode">
            <button type="button" class="btn btn-danger" (click)="isDeleteModalOpen = true" [disabled]="isSubmitting">
                Delete
            </button>
        </div>
    </div>
</form>

<app-confirm-delete-modal
    [open]="isDeleteModalOpen"
    title="Delete idea"
    [message]="deleteConfirmMessage"
    (confirm)="confirmDelete()"
    (cancel)="isDeleteModalOpen = false">
</app-confirm-delete-modal>
